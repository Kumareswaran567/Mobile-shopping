<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Mobiles - MobileHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            line-height: 1.6;
        }
        
        .navbar {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo { font-size: 1.5rem; font-weight: bold; }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
            font-size: 2.5rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .card-content {
            padding: 20px;
        }
        
        .brand { font-size: 1.1rem; color: #667eea; font-weight: bold; }
        .model { font-size: 1.3rem; margin: 5px 0; color: #333; }
        .price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }
        
        .details-btn {
            width: 100%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .details-btn:hover { transform: scale(1.02); }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📱 MobileHub</div>
            <a href="index.html" class="back-btn">← Back to Home</a>
        </div>
    </nav>  
    
    <div class="container">
        <h1>All Latest Mobiles</h1>
        <div class="grid" id="mobileGrid"></div>
    </div>

    <script>
        const mobiles = [

            {id:3, brand:'OnePlus', model:'12', price:'64999', img:'https://i.pinimg.com/736x/74/0d/89/740d8953900ee06d66cc138ec2772748.jpg', ram:'12GB', storage:'256GB', camera:'50MP', battery:'5400mAh'},

            {id:6, brand:'Samsung', model:'Galaxy Z Fold6', price:'189999', img:'https://i.pinimg.com/736x/6c/e0/61/6ce06174043a8a7c7b0ed4ae5622e7c0.jpg', ram:'12GB', storage:'512GB', camera:'200MP', battery:'4400mAh'},
            {id:7, brand:'iPhone', model:'15 Pro', price:'119999', img:'https://i.pinimg.com/736x/a8/e8/80/a8e880e1f954c1411b1ab53ba76fcc12.jpg', ram:'8GB', storage:'128GB', camera:'48MP', battery:'3274mAh'},
            {id:8, brand:'Vivo', model:'X100 Pro', price:'89999', img:'https://i.pinimg.com/736x/1f/69/d1/1f69d1b2717c5be010d9787e0b30b3c1.jpg', ram:'16GB', storage:'512GB', camera:'50MP', battery:'5400mAh'},
            {id:9, brand:'Oppo', model:'Find X7 Ultra', price:'99999', img:'https://i.pinimg.com/736x/e1/20/8c/e1208cb36add77ca73853236f2f26a70.jpg', ram:'16GB', storage:'512GB', camera:'50MP', battery:'5000mAh'},
            {id:10, brand:'Motorola', model:'Razr 50 Ultra', price:'99999', img:'https://i.pinimg.com/736x/29/e0/97/29e097fbbeec495e5c968b5014a0f498.jpg', ram:'12GB', storage:'512GB', camera:'50MP', battery:'4000mAh'},

            {id:17, brand:'Asus', model:'ROG Phone 8', price:'99999', img:'https://i.pinimg.com/736x/5b/1d/f7/5b1df7b344099607ccc8216a0e18d3aa.jpg', ram:'16GB', storage:'512GB', camera:'50MP', battery:'5500mAh'},
            {id:18, brand:'Sony', model:'Xperia 1 VI', price:'139999', img:'https://i.pinimg.com/736x/d0/c6/d7/d0c6d75a28520f627fae7e5db3e96b63.jpg', ram:'12GB', storage:'256GB', camera:'48MP', battery:'5000mAh'},
            {id:19, brand:'Nokia', model:'XR21', price:'44999', img:'https://i.pinimg.com/736x/9b/dd/e8/9bdde88fd52bd8430b11ba2e2fb07c25.jpg', ram:'6GB', storage:'128GB', camera:'64MP', battery:'4800mAh'},
            {id:20, brand:'Infinix', model:'Zero Ultra', price:'32999', img:'https://i.pinimg.com/736x/4d/23/c5/4d23c5820b6b492dbc727e0c7dd255cb.jpg', ram:'8GB', storage:'256GB', camera:'200MP', battery:'5000mAh'}
        ];

        function createMobileCard(mobile) {
            return `
                <div class="card" onclick="viewDetails(${mobile.id})">
                    <img src="${mobile.img}" alt="${mobile.brand} ${mobile.model}">
                    <div class="card-content">
                        <div class="brand">${mobile.brand}</div>
                        <div class="model">${mobile.model}</div>
                        <div class="price">₹${mobile.price.toLocaleString()}</div>
                        <button class="details-btn">View Details</button>
                    </div>
                </div>
            `;
        }

        document.getElementById('mobileGrid').innerHTML = mobiles.map(createMobileCard).join('');

        function viewDetails(id) {
            const mobile = mobiles.find(m => m.id === id);
            sessionStorage.setItem('selectedMobile', JSON.stringify(mobile));
            window.location.href = 'details.html';
        }
    </script>
</body>

</html>
