<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - MobileHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .success-container {
            background: white;
            border-radius: 25px;
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.8s ease-out;
        }
        
        .checkmark {
            width: 120px;
            height: 120px;
            background: #27ae60;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            position: relative;
            animation: bounceIn 0.6s ease-out;
        }
        
        .checkmark::before {
            content: '✓';
            color: white;
            font-size: 60px;
            font-weight: bold;
        }
        
        h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        
        .message {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }
        
        .order-summary {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin: 30px 0;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }
        
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .total {
            font-size: 1.4rem;
            font-weight: bold;
            color: #27ae60;
        }
        
        .home-btn {
            display: inline-block;
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            padding: 18px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            transition: all 0.3s;
            animation: fadeInUp 0.8s ease-out 0.8s both;
        }
        
        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .success-container { padding: 40px 25px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="checkmark"></div>
        <h1>🎉 Payment Successful!</h1>
        <p class="message">Thank you for your purchase. Your order has been confirmed!</p>
        
        <div class="order-summary" id="orderSummary">
         
        </div>
        
        <a href="index.html" class="home-btn">← Back to Home</a>
    </div>

    <script>
        const orderDetails = JSON.parse(sessionStorage.getItem('orderDetails'));
        if (orderDetails) {
            const mobile = orderDetails.mobile;
            document.getElementById('orderSummary').innerHTML = `
                <div class="summary-item">
                    <span>Product:</span>
                    <span>${mobile.brand} ${mobile.model}</span>
                </div>
                <div class="summary-item">
                    <span>Customer:</span>
                    <span>${orderDetails.customer.name}</span>
                </div>
                <div class="summary-item">
                    <span>Payment Method:</span>
                    <span>**** **** **** ${orderDetails.cardNumber.slice(-4)}</span>
                </div>
                <div class="summary-item total">
                    <span>Total Paid:</span>
                    <span>₹${mobile.price.toLocaleString()}</span>
                </div>
            `;
        }
    </script>
</body>
</html>
